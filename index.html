        function showCustomDialog({ title, message, type = 'info', showCancel = false }) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('customDialogOverlay'); const iconContainer = document.getElementById('dialogIconContainer'); const icon = document.getElementById('dialogIcon'); const titleEl = document.getElementById('dialogTitle'); const messageEl = document.getElementById('dialogMessage'); const btnConfirm = document.getElementById('dialogBtnConfirm'); const btnCancel = document.getElementById('dialogBtnCancel');
                iconContainer.className = 'w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 '; btnConfirm.className = 'px-5 py-2.5 text-white rounded-xl font-bold shadow-md transition w-full sm:w-auto ';
                if (type === 'success') { iconContainer.classList.add('bg-green-100', 'text-green-600'); icon.className = 'fas fa-check text-3xl'; btnConfirm.classList.add('bg-green-600', 'hover:bg-green-700'); titleEl.innerText = title || 'Berhasil'; } 
                else if (type === 'error') { iconContainer.classList.add('bg-red-100', 'text-red-600'); icon.className = 'fas fa-times text-3xl'; btnConfirm.classList.add('bg-red-600', 'hover:bg-red-700'); titleEl.innerText = title || 'Gagal'; } 
                else if (type === 'warning') { iconContainer.classList.add('bg-yellow-100', 'text-yellow-600'); icon.className = 'fas fa-exclamation text-3xl'; btnConfirm.classList.add('bg-yellow-500', 'hover:bg-yellow-600'); titleEl.innerText = title || 'Peringatan'; } 
                else { iconContainer.classList.add('bg-blue-100', 'text-blue-600'); icon.className = 'fas fa-info text-3xl'; btnConfirm.classList.add('bg-blue-600', 'hover:bg-blue-700'); titleEl.innerText = title || 'Informasi'; }
                messageEl.innerText = message; btnCancel.classList.toggle('hidden', !showCancel); btnConfirm.innerText = showCancel ? 'Ya, Lanjutkan' : 'OK Mengerti'; overlay.classList.remove('hidden');
                const closeModal = (result) => { overlay.classList.add('hidden'); btnConfirm.onclick = null; btnCancel.onclick = null; resolve(result); };
                btnConfirm.onclick = () => closeModal(true); btnCancel.onclick = () => closeModal(false);
            });
        }
        const customAlert = (message, type = 'info', title = null) => showCustomDialog({ title, message, type, showCancel: false });
        const customConfirm = (message, title = 'Konfirmasi') => showCustomDialog({ title, message, type: 'warning', showCancel: true });

        // FUNGSI PENCARIAN (SEARCH) REAL-TIME GLOBAL
        window.filterItems = function(inputId, containerId, itemClassOrTag) {
            let filter = document.getElementById(inputId).value.toLowerCase();
            let container = document.getElementById(containerId);
            if(!container) return;
            let items = container.querySelectorAll(itemClassOrTag);
            for (let item of items) {
                // Abaikan baris tabel yang berupa pesan kosong (misal: "Belum ada data")
                if(item.tagName === 'TR' && item.children.length === 1 && item.children[0].colSpan > 1) continue;
                item.style.display = item.textContent.toLowerCase().includes(filter) ? "" : "none";
            }
        };

        const memStore = {};
        function getSafe(k) { if(memStore[k] !== undefined) return memStore[k]; try { return localStorage.getItem(k); } catch(e) { return null; } }
        function setSafe(k, v) { try { localStorage.setItem(k, v); if(memStore[k]) delete memStore[k]; } catch(e) { memStore[k] = v; } }
        function rmSafe(k) { try { localStorage.removeItem(k); } catch(e) {} delete memStore[k]; }
		// FUNGSI HELPER UNTUK CEK TANGGAL DARI SHEET/LOKAL YANG AMAN DARI ZONA WAKTU
		function checkSameDate(dbDate, filterDateStr) {
			if(!dbDate) return false;
			let dbStr = String(dbDate);
			if(dbStr === filterDateStr || dbStr.startsWith(filterDateStr)) return true;
			let d = new Date(dbDate);
			if(!isNaN(d.getTime())) {
				let y = d.getFullYear();
				let m = String(d.getMonth() + 1).padStart(2, '0');
				let dd = String(d.getDate()).padStart(2, '0');
				return `${y}-${m}-${dd}` === filterDateStr;
			}
			return false;
		}

        // FUNGSI EXPORT EXCEL GENERAL
			window.exportTableToExcel = function(tableId, filename) {
				document.getElementById('loadingText').innerText = "Menyiapkan Excel...";
				document.getElementById('loadingOverlay').classList.remove('hidden');
				setTimeout(() => {
					let table = document.getElementById(tableId);
					if(!table) { customAlert("Tabel tidak ditemukan.", "error"); document.getElementById('loadingOverlay').classList.add('hidden'); return; }
					let wb = XLSX.utils.table_to_book(table, {sheet: "Sheet1"});
					let finalName = filename.endsWith('.xlsx') ? filename : filename + '.xlsx';
					let wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
					let blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
					let url = URL.createObjectURL(blob);
					let a = document.createElement('a');
					a.href = url; a.download = finalName;
					document.body.appendChild(a); a.click();
					document.body.removeChild(a);
					setTimeout(() => URL.revokeObjectURL(url), 1000);
					document.getElementById('loadingOverlay').classList.add('hidden');
				}, 500);
			}

        // FUNGSI MULTI-SHEET EXCEL UNTUK RIWAYAT PENILAIAN
        window.downloadSemuaRiwayatNilaiExcel = function() {
            document.getElementById('loadingText').innerText = "Membuat Multi-Sheet Excel..."; 
            document.getElementById('loadingOverlay').classList.remove('hidden');
            setTimeout(() => {
                let wb = XLSX.utils.book_new(); let nilaiDb = filterBySchool(getDB('mc_nilai')).filter(function(n){ return !n.guruUsername || n.guruUsername === currentUserUsername; }); let students = getMyStudents(); let grouped = {};
                nilaiDb.forEach(n => { if(!grouped[n.judul]) grouped[n.judul] = []; let s = students.find(x => x.id == n.studentId); grouped[n.judul].push({ 'NISN': s ? s.nisn : '-', 'Nama Siswa': s ? s.nama : 'Unknown', 'Kelas': s ? s.kelas : '-', 'Nilai': parseInt(n.score) || 0 }); });
                let hasData = false;
                for(let judul in grouped) { hasData = true; let ws = XLSX.utils.json_to_sheet(grouped[judul]); let safeJudul = judul.substring(0, 31).replace(/[\\/*?:\[\]]/g, ""); XLSX.utils.book_append_sheet(wb, ws, safeJudul); }
                if(hasData) {
				let wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
				let blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
				let url = URL.createObjectURL(blob);
				let a = document.createElement('a');
				a.href = url; a.download = 'Riwayat_Input_Penilaian.xlsx';
				document.body.appendChild(a); a.click();
				document.body.removeChild(a);

	window.exportToWord = function(elementId, filename = 'document', isLandscape = false) {
    const content = document.getElementById(elementId);
    if (!content) return;

    // 1. Kloning elemen
    const cloneEl = content.cloneNode(true);

    // 2. KRUSIAL: Sinkronisasi data dari input/textarea asli ke elemen kloning
    // Karena cloneNode tidak menyalin nilai yang diketik user di input/textarea
    const originalInputs = content.querySelectorAll('input, textarea, select');
    const clonedInputs = cloneEl.querySelectorAll('input, textarea, select');
    
    originalInputs.forEach((original, index) => {
        const val = original.value || "";
        const replacement = document.createElement('span');
        replacement.innerText = val === "" ? " " : val;
        clonedInputs[index].parentNode.replaceChild(replacement, clonedInputs[index]);
    });

    // 3. Pembersihan Placeholder & Styling
    cloneEl.querySelectorAll('[contenteditable], .hover\\:bg-yellow-100, td, span').forEach(el => {
        let text = el.innerText.trim();
        // Jika teks hanya titik-titik placeholder, bersihkan agar Word rapi
        if (text.includes('.......') || text === "................") {
            el.innerText = ""; 
        }
        el.removeAttribute('contenteditable');
        el.style.backgroundColor = 'transparent';
    });

    // 4. Penanganan Gambar/Logo agar muncul
    cloneEl.querySelectorAll('img').forEach(img => {
        img.style.width = '80px';
        img.style.height = '80px';
        img.setAttribute('width', '80');
        img.setAttribute('height', '80');
    });

    // 5. Setting Page Orientation
    const pageOrientation = isLandscape ? 
        "@page { size: A4 landscape; mso-page-orientation: landscape; margin: 1cm; }" : 
        "@page { size: A4 portrait; margin: 2cm; }";

    const preHtml = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
            <meta charset='utf-8'>
            <style>
                ${pageOrientation}
                body { font-family: 'Times New Roman', serif; font-size: 12pt; }
                table { border-collapse: collapse; width: 100%; border: 1px solid black; }
                th, td { border: 1px solid black; padding: 5px; vertical-align: top; }
                .text-center { text-align: center; }
            </style>
        </head>
        <body>`;
    
    const postHtml = "</body></html>";
    const html = preHtml + cloneEl.innerHTML + postHtml;

    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename + '.doc';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};


        function compressImageToBase64(file, maxWidth = 800) {
            return new Promise((resolve, reject) => {
                if(!file) return resolve(''); const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = (event) => { const img = new Image(); img.src = event.target.result; img.onload = () => { const canvas = document.createElement('canvas'); let scaleSize = 1; if (img.width > maxWidth) { scaleSize = maxWidth / img.width; } canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); resolve(canvas.toDataURL(file.type || 'image/jpeg', 0.8)); } }; reader.onerror = error => reject(error);
            });
        }

        window.simpanPengaturan = async function() {
            let skpd = document.getElementById('setSKPD').value; let sekolah = document.getElementById('setSekolah').value; let alamat = document.getElementById('setAlamat').value; let email = document.getElementById('setEmail').value; let npsn = document.getElementById('setNpsn').value;

            let fKiri = document.getElementById('fileLogoKiri').files[0]; let fKanan = document.getElementById('fileLogoKanan').files[0];
            
            let settingsDb = getDB('mc_settings');
            let s = settingsDb.find(set => set.username === currentUserUsername) || {};
            let finalKiri = s.logoKiri || ''; let finalKanan = s.logoKanan || '';
            
            document.getElementById('loadingText').innerText = "Menyimpan Pengaturan..."; document.getElementById('loadingOverlay').classList.remove('hidden');
            try {
                // FIX CORS PDF: Simpan sebagai murni teks Base64 tanpa upload ke Google Drive.
                // Resolusi dicompress ke 150px agar karakter teks ringan masuk ke sel Google Sheets
                if(fKiri) { finalKiri = await compressImageToBase64(fKiri, 150); }
                if(fKanan) { finalKanan = await compressImageToBase64(fKanan, 150); }
                
                let data = { id: Date.now(), username: currentUserUsername, schoolCode: currentSchoolCode, skpd, sekolah, alamat, email, npsn, logoKiri: finalKiri, logoKanan: finalKanan, namaKepsek, nipKepsek, namaGuru, nipGuru };
                
                let idx = settingsDb.findIndex(function(set){ return set.username === currentUserUsername && (!set.schoolCode || set.schoolCode === currentSchoolCode); });
                if (idx > -1) settingsDb[idx] = data; else settingsDb.push(data);
                
                saveDB('mc_settings', settingsDb); syncToSheet('simpan_settings', data);
                document.getElementById('loadingOverlay').classList.add('hidden'); customAlert("Pengaturan Berhasil Disimpan!", "success"); renderGuruPengaturan();
            } catch(e) { document.getElementById('loadingOverlay').classList.add('hidden'); customAlert("Gagal menyimpan: " + e.message, "error"); }
        }

        window.saveKurikulum = function() {
            let kelas = document.getElementById('kKelas').value; let mapel = document.getElementById('kMapel').value;
            let semester = document.getElementById('kSemester').value; let bab = document.getElementById('kBab').value;
            let materi = document.getElementById('kMateri').value; let tp = document.getElementById('kTP').value;
            
            if(!kelas || !mapel || !bab || !materi || !tp) { customAlert("Semua kolom harus diisi!", "warning"); return; }
            document.getElementById('loadingText').innerText = "Menyimpan Kurikulum..."; document.getElementById('loadingOverlay').classList.remove('hidden');
            
            setTimeout(() => {
                let kurikulum = getDB('mc_kurikulum');
                if (editingKurikulumId) {
                    let idx = kurikulum.findIndex(x => x.id == editingKurikulumId);
                    if (idx > -1) {
                        kurikulum[idx].Kelas = kelas; kurikulum[idx].MataPelajaran = mapel; kurikulum[idx].Semester = semester;
                        kurikulum[idx].Bab = bab; kurikulum[idx].MateriPokok = materi; kurikulum[idx].TujuanPembelajaran = tp;
                        saveDB('mc_kurikulum', kurikulum); syncToSheet('update_kurikulum', kurikulum[idx]);
                    }
                    editingKurikulumId = null;
                } else {
                    let newK = { id: Date.now(), Kelas: kelas, MataPelajaran: mapel, Semester: semester, Bab: bab, MateriPokok: materi, TujuanPembelajaran: tp };

                document.getElementById('loadingOverlay').classList.add('hidden'); customAlert("Data berhasil disimpan!", "success"); renderGuruDatabase();
            }, 400);
        }

            const isConfirm = await customConfirm("Hapus data kurikulum ini secara permanen?", "Peringatan Hapus"); if(!isConfirm) return;
            document.getElementById('loadingText').innerText = "Menghapus..."; document.getElementById('loadingOverlay').classList.remove('hidden');

                let kurikulum = getDB('mc_kurikulum').filter(k => k.id != id); saveDB('mc_kurikulum', kurikulum); syncToSheet('hapus_kurikulum', { id: id });
                if(editingKurikulumId === id) editingKurikulumId = null;
                document.getElementById('loadingOverlay').classList.add('hidden'); renderGuruDatabase();
            }, 400);
        }

// LOGIKA MODAL PROMES - DENGAN CADANGAN (FALLBACK) DARI KOLOM K
// =========================================================================
window.bukaModalPromes = function() {
    let tahun = document.getElementById('prTahun').value;
    let kelas = document.getElementById('prKelas').value;
    let semester = document.getElementById('prSemester').value;
    let cbMapels = document.querySelectorAll('.cb-mapel-promes:checked');

    if(!tahun || !kelas || !semester) { customAlert("Pilih Tahun, Kelas, dan Semester terlebih dahulu!", "warning"); return; }
    if(cbMapels.length !== 1) { customAlert("Untuk MENGISI / EDIT tanggal, silakan centang TEPAT SATU Mata Pelajaran saja.", "warning"); return; }

    let mapel = cbMapels[0].value;
    let kurikulumDB = getDB('mc_kurikulum').filter(k => k.Kelas === kelas && k.Semester === semester && k.MataPelajaran === mapel);
    if(kurikulumDB.length === 0) { customAlert("Data kurikulum belum tersedia untuk Mapel tersebut.", "info"); return; }

    let months = semester === 'Semester I' ? ['Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'] : ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni'];

    let html = `<div class="mb-4 bg-green-50 p-4 rounded-lg border border-green-200"><p class="font-bold text-green-800">Mapel: ${mapel} | Kelas: ${kelas} | ${semester}</p><p class="text-[10px] text-green-700 mt-1 italic">*Jika data input baru kosong, sistem otomatis mengambil data dari tabel preview (Kolom K).</p></div><div class="space-y-4">`;
    
    kurikulumDB.forEach((item, index) => {
        let batchIdPromes = `${kelas}_${mapel}_${semester.replace(' ','')}_${tahun.replace('/','-')}`;
        let saved = getDB('mc_promes').find(p => p.tp === item.TujuanPembelajaran && p.batchId === batchIdPromes && (p.guruUsername === currentUserUsername || !p.guruUsername));
        
        let rawTgl = Array(6).fill('');
        if (saved) {
            // 1. Coba ambil dari DataBulan (Kolom O)
            if (saved.dataBulan && saved.dataBulan !== "") {
                try { rawTgl = JSON.parse(saved.dataBulan); } catch(e) { rawTgl = Array(6).fill(''); }
            } 
            // 2. CADANGAN: Jika Kolom O kosong, konversi data dari Kolom K (DataMinggu)
            else if (saved.dataMinggu) {
                try {
                    let dm = typeof saved.dataMinggu === 'string' ? JSON.parse(saved.dataMinggu) : saved.dataMinggu;
                    if (Array.isArray(dm)) {
                        for(let mIdx = 0; mIdx < 6; mIdx++) {
                            let monthlyValues = [];
                            for(let wIdx = 0; wIdx < 5; wIdx++) {
                                let val = dm[mIdx * 5 + wIdx];
                                if(val && val.toString().trim() !== '') {
                                    monthlyValues.push(val.toString().trim());
                                }
                            }
                            rawTgl[mIdx] = [...new Set(monthlyValues)].join(', ');
                        }
                    }
                } catch(e) { console.warn("Gagal konversi kolom K", e); }
            }
        }

        html += `<div class="p-4 border border-green-200 rounded-xl shadow-sm bg-white"><div class="text-xs font-bold text-gray-500 mb-1">${item.Bab} - ${item.MateriPokok}</div><div class="text-sm font-semibold text-gray-800 mb-3">${item.TujuanPembelajaran}</div><div class="grid grid-cols-3 md:grid-cols-6 gap-2">`;
        months.forEach((m, mIdx) => {
            html += `<div><label class="text-[10px] uppercase font-bold text-gray-400 block text-center mb-1">${m}</label><input type="text" id="mP_${index}_${mIdx}" value="${rawTgl[mIdx] || ''}" placeholder="Tgl" class="w-full p-2 border rounded text-center text-sm font-bold text-green-700 outline-none focus:ring-2 focus:ring-green-300"></div>`;
        });
        html += `</div></div>`;
    });
    html += `</div>`;

    document.getElementById('modalKurikulumTitle').innerHTML = `<i class="fas fa-calendar-check mr-2"></i> Input Tanggal Promes`;
    document.getElementById('modalKurikulumBody').innerHTML = html;
    document.getElementById('btnSimpanModalKurikulum').onclick = () => simpanModalPromes(kurikulumDB, tahun, kelas, mapel, semester);
    document.getElementById('modalInputKurikulum').classList.remove('hidden');
};

			window.simpanModalPromes = function(kurikulumDB, tahun, kelas, mapel, semester) {
			    let rowToSave = [];
			    let batchIdPromes = `${kelas}_${mapel}_${semester.replace(' ','')}_${tahun.replace('/','-')}`;
			    let batchIdProta = `${kelas}_${mapel}_${tahun.replace('/','-')}`;
			    
			    kurikulumDB.forEach((item, i) => {
			        let dataBulan = [];
			        let dataMinggu = Array(30).fill(''); 
			        let hasData = false;

			        for(let mIdx = 0; mIdx < 6; mIdx++) {
			            let inputEl = document.getElementById(`mP_${i}_${mIdx}`);
			            let val = inputEl ? inputEl.value.trim() : '';
			            dataBulan.push(val);
			            
			            if(val !== '') {
			                hasData = true;
			                let tglParts = val.split(/[- ,/]+/);
			                tglParts.forEach(t => {
			                    let day = parseInt(t);
			                    if(!isNaN(day) && day >= 1 && day <= 31) {
			                        let weekIdx = Math.ceil(day / 7) - 1;
			                        if(weekIdx > 4) weekIdx = 4;
			                        let absoluteIndex = (mIdx * 5) + weekIdx;
			                        dataMinggu[absoluteIndex] = val; 
			                    }
			                });
			            }
			        }

			        if(hasData) {
			            let awVal = '-';
			            let savedProta = getDB('mc_prota').find(p => p.batchId === batchIdProta && p.tp === item.TujuanPembelajaran && p.bab === item.Bab && (p.guruUsername === currentUserUsername || !p.guruUsername));
			            if(savedProta) awVal = savedProta.alokasi;
			            
			            rowToSave.push({
			                id: Date.now() + i, guru: currentUserName, guruUsername: currentUserUsername, tahun: tahun, kelas: kelas, mapel: mapel,
			                semester: semester, babMateri: item.Bab + ' - ' + item.MateriPokok, tp: item.TujuanPembelajaran,
			                aw: awVal, dataMinggu: dataMinggu, dataBulan: JSON.stringify(dataBulan), keterangan: '', batchId: batchIdPromes
			            });
			        }
			    });

			    document.getElementById('loadingText').innerText = "Menyimpan Promes..."; 
			    document.getElementById('loadingOverlay').classList.remove('hidden');

			    setTimeout(() => {
			        let db = getDB('mc_promes');
			        // PENTING: Filter pengaman antar guru
			        db = db.filter(p => !(p.batchId === batchIdPromes && p.guruUsername === currentUserUsername)); 
			        db.push(...rowToSave); 
			        
			        saveDB('mc_promes', db);
			        syncToSheet('simpan_promes', { batchId: batchIdPromes, rows: rowToSave });
			        
			        document.getElementById('loadingOverlay').classList.add('hidden');
			        document.getElementById('modalInputKurikulum').classList.add('hidden');
			        customAlert(`Data Promes ${mapel} berhasil disimpan!`, "success");
			        
			        if(typeof window.generateTabelPromes === 'function') window.generateTabelPromes();
			    }, 500);
			};

			   window.simpanDataPromes = function() {
			let tahun = document.getElementById('prDataTahun').value;
			let kelas = document.getElementById('prDataKelas').value;
			let mapel = document.getElementById('prDataMapel').value;
			let semester = document.getElementById('prDataSemester').value;
			let batchId = `${kelas}_${mapel}_${semester.replace(' ','')}_${tahun.replace('/','-')}`;
			
			let kurikulumDB = getDB('mc_kurikulum').filter(k => k.Kelas === kelas && k.MataPelajaran === mapel && k.Semester === semester);
			let rowToSave = [];
			
			// Ambil data alokasi waktu dari Prota untuk referensi otomatis
			let batchIdProta = `${kelas}_${mapel}_${tahun.replace('/','-')}`;
			let protaDb = getDB('mc_prota');

			kurikulumDB.forEach((item, i) => {
				let dataMinggu = [];
				let hasData = false;
				
				// Loop 30 kolom minggu
				for(let w = 0; w < 30; w++) {
					let el = document.querySelector(`input[data-type="pr_week"][data-idx="${i}"][data-w="${w}"]`);
					let val = el ? el.value : '';
					dataMinggu.push(val);
					if(val !== '') hasData = true;
				}

				let ketEl = document.querySelector(`input[data-type="pr_week"][data-idx="${i}"]`); // Koreksi selector keterangan
				let ketVal = document.querySelector(`input[data-type="pr_ket"][data-idx="${i}"]`).value;
				if(ketVal !== '') hasData = true;

				if(hasData) {
					let awVal = '-';
					let savedProta = protaDb.find(p => p.batchId === batchIdProta && p.tp === item.TujuanPembelajaran && p.bab === item.Bab);
					if(savedProta) awVal = savedProta.alokasi;

					rowToSave.push({
						id: Date.now() + i,
						guru: currentUserName,
						tahun: tahun,
						kelas: kelas,
						mapel: mapel,
						semester: semester,
						babMateri: item.Bab + ' - ' + item.MateriPokok,
						tp: item.TujuanPembelajaran,
						aw: awVal,
						dataMinggu: dataMinggu,
						keterangan: ketVal,
						batchId: batchId
					});
				}
			});

			if(rowToSave.length === 0) {
				customAlert("Isi data absen minggu atau keterangan sebelum menyimpan!", "warning");
				return;
			}

			document.getElementById('loadingText').innerText = "Menyimpan Promes...";
			document.getElementById('loadingOverlay').classList.remove('hidden');

			setTimeout(() => {
				let promesDb = getDB('mc_promes').filter(p => p.batchId !== batchId);
				promesDb.push(...rowToSave);
				saveDB('mc_promes', promesDb);

				syncToSheet('simpan_promes', { batchId: batchId, rows: rowToSave });
				document.getElementById('loadingOverlay').classList.add('hidden');
				customAlert("Data Promes Berhasil Disimpan!", "success");
			}, 600);
		};

        window.simpanNilaiMassal = function() { 
            const judul = document.getElementById('nJudul').value; if(!judul) { customAlert("Isi Topik Penilaian!", "warning"); return; } 
            document.getElementById('loadingText').innerText = "Menyimpan Nilai..."; document.getElementById('loadingOverlay').classList.remove('hidden'); 
            setTimeout(() => { 
                let nilaiDB = getDB('mc_nilai'); 
                if(editingNilaiJudul) { nilaiDB = nilaiDB.filter(function(n){ return !(n.judul === editingNilaiJudul && (!n.schoolCode || n.schoolCode === currentSchoolCode)); }); syncToSheet('hapus_nilai_judul', {judul: editingNilaiJudul, schoolCode: currentSchoolCode}); } 
                else if(nilaiDB.some(n => n.judul === judul)) { document.getElementById('loadingOverlay').classList.add('hidden'); customAlert("Judul ini sudah ada. Gunakan nama lain.", "error"); return; }
                let newRecords = []; getMyStudents().forEach(s => { const scoreElem = document.getElementById('n_' + s.id); if(scoreElem && scoreElem.value) { let rec = { id: Date.now() + s.id, studentId: s.id, judul: judul, score: scoreElem.value, schoolCode: currentSchoolCode, guruUsername: currentUserUsername }; nilaiDB.push(rec); newRecords.push(rec); } });

    // 2. BUAT TABEL PILIHAN GANDA (2 Kolom)

        pgHtml += `<table style="width: 48%; border-collapse: collapse; text-align: center; font-size: 13px;">

                pgHtml += `</tr>`;

        }
        pgHtml += `</tbody></table>`;

    // 3. BUAT AREA ESSAY / URAIAN JIKA ADA

                    <td style="border-bottom: 1px solid black; padding: 8px 0;"></td>
                </tr>
                <tr><td style="padding: 12px 0;"></td><td style="border-bottom: 1px solid black;"></td></tr>
                <tr><td style="padding: 12px 0;"></td><td style="border-bottom: 1px solid black;"></td></tr>`;
        }
        essayHtml += `</table></div>`;
    }

    // 4. RENDER KE DALAM KERTAS (GABUNGAN)
    document.getElementById('ljkGridArea').innerHTML = `
        <div style="text-align: center; margin-bottom: 15px;">
            <h1 style="font-size: 26px; font-weight: bold; letter-spacing: 2px; font-family: Impact, sans-serif; -webkit-text-stroke: 1px black; color: white; display:inline-block; border: 2px solid black; padding: 5px 20px;">LEMBAR JAWABAN</h1>
        </div>

        <div style="position: relative; padding: 25px 20px; border: 1px solid transparent;">
            
            <div style="position: absolute; top: 0; left: 0; width: 18px; height: 18px; background-color: #000; border-radius: 2px;"></div>
            <div style="position: absolute; top: 0; right: 0; width: 18px; height: 18px; background-color: #000; border-radius: 2px;"></div>
            <div style="position: absolute; bottom: 0; left: 0; width: 18px; height: 18px; background-color: #000; border-radius: 2px;"></div>
            <div style="position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; background-color: #000; border-radius: 2px;"></div>

            <table style="width: 100%; margin-bottom: 25px; font-family: 'Times New Roman', serif; font-size: 14px; font-weight: bold;">

                    <td style="width: 10px;">:</td>

        ${essayHtml}
    `;

window.bukaPopupKunciLJK = function() {
    let topik = document.getElementById('sTopik').value;
    let mapel = document.getElementById('sMapel').value;
    let jmlPG = parseInt(document.getElementById('sJmlPG').value) || 0;
    let jmlEssay = parseInt(document.getElementById('sJmlEssay').value) || 0;
    let skorPG = parseFloat(document.getElementById('sSkorPG').value) || 1;

    if(!topik || !mapel || jmlPG <= 0) { customAlert("Topik, Mapel, dan Jumlah PG wajib diisi dengan benar!", "warning"); return; }

    let html = `<div class="bg-rose-50 p-3 rounded mb-4 text-sm text-rose-800 border border-rose-200">Silakan masukkan Kunci Jawaban untuk <b>${jmlPG} Soal Pilihan Ganda</b>.</div>`;
    html += '<div class="grid grid-cols-4 md:grid-cols-5 gap-3">';
    for(let i=1; i<=jmlPG; i++) {
        html += `
        <div class="flex items-center border border-gray-300 rounded overflow-hidden">
            <span class="bg-gray-100 font-bold text-xs p-2 border-r border-gray-300 w-10 text-center">${i}.</span>
            <select id="kunci_${i}" class="w-full p-2 outline-none font-bold text-center appearance-none cursor-pointer hover:bg-gray-50">
                <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option>
            </select>
        </div>`;
    }
    html += '</div>';

    document.getElementById('modalKurikulumTitle').innerHTML = '<i class="fas fa-key text-rose-600 mr-2"></i> Set Kunci Jawaban LJK';
    document.getElementById('modalKurikulumBody').innerHTML = html;
    document.getElementById('btnSimpanModalKurikulum').onclick = () => window.simpanTopikLJK(topik, mapel, jmlPG, jmlEssay, skorPG);
    document.getElementById('modalInputKurikulum').classList.remove('hidden');
};

window.simpanTopikLJK = function(topik, mapel, jmlPG, jmlEssay, skorPG) {
    let kunci = [];
    for(let i=1; i<=jmlPG; i++) { kunci.push(document.getElementById('kunci_'+i).value); }
    
    let data = {
        id: Date.now(),
        guruUsername: currentUserUsername,
        schoolCode: currentSchoolCode,
        topik: topik,
        mapel: mapel,
        jmlPG: jmlPG,
        jmlEssay: jmlEssay,
        skorPG: skorPG,
        kunciPG: kunci,
        tanggal: new Date().toISOString(),
        dataSiswa: [] 
    };

    let db = getDB('mc_ljk_scan');
    db.push(data);
    saveDB('mc_ljk_scan', db);
    
    document.getElementById('modalInputKurikulum').classList.add('hidden');
    customAlert("Topik LJK dan Kunci Jawaban berhasil disimpan!", "success");
    window.renderGuruLJK();
};

window.hapusLJKScan = async function(id) {
    if(!await customConfirm("Hapus topik LJK ini beserta semua data hasil scannya?", "Peringatan Hapus")) return;
    let db = getDB('mc_ljk_scan').filter(s => s.id !== id);
    saveDB('mc_ljk_scan', db);
    window.renderGuruLJK();
};

window.bukaLJKKamera = function(id) {
    window.activeScanId = id;
    window.stateRiwayatScan = 'kamera';
    window.renderGuruLJK();

    // Meminta akses kamera setelah UI dirender
    setTimeout(() => {
        const video = document.getElementById('videoLJK');
        if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            // Memprioritaskan kamera belakang (environment) untuk HP
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(function(stream) {
                window.kameraStream = stream;
                video.srcObject = stream;
                video.play();
                document.getElementById('kameraLoading').classList.add('hidden');
            })
            .catch(function(err) {
                document.getElementById('kameraLoading').innerHTML = `<i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-2"></i><br>Akses Kamera Ditolak / Tidak Ditemukan.`;
                console.error("Kamera error: ", err);
            });
        } else {
            document.getElementById('kameraLoading').innerHTML = "Browser Anda tidak mendukung akses kamera.";
        }
    }, 500);
};

window.tutupKameraLJK = function() {
    if(window.kameraStream) {
        window.kameraStream.getTracks().forEach(track => track.stop());
        window.kameraStream = null;
    }
    window.stateRiwayatScan = 'list'; 
    window.renderGuruLJK();
};

window.captureDanEvaluasiLJK = function() {
    const video = document.getElementById('videoLJK');
    const canvas = document.getElementById('canvasHasil');
    const ctx = canvas.getContext('2d');
    const dataScan = getDB('mc_ljk_scan').find(s => s.id === window.activeScanId);
    const students = getMyStudents();

    if(!video.videoWidth || students.length === 0) {
        customAlert("Kamera belum siap atau Anda belum memiliki data Siswa.", "warning");
        return;
    }

    // 1. Ambil Snapshot dari Video ke Canvas
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // 2. SIMULASI OMR: Tarik satu siswa acak, dan generate nilai acak
    let randStu = students[Math.floor(Math.random() * students.length)];
    let benar = Math.floor(Math.random() * (dataScan.jmlPG + 1)); 
    let salah = dataScan.jmlPG - benar;
    let skorDiperoleh = benar * dataScan.skorPG;
    let skorMaksimal = dataScan.jmlPG * dataScan.skorPG;
    let nilai = Math.round((skorDiperoleh / skorMaksimal) * 100);

    // 3. GAMBAR OVERLAY VISUAL (Titik Hijau & Merah)
    // Catatan: Karena kita belum pakai OpenCV untuk mendeteksi koordinat asli, 
    // kita gambar titik secara acak di area tengah kanvas untuk efek visualisasi.
    for(let i = 0; i < dataScan.jmlPG; i++) {
        let isCorrect = Math.random() > 0.3; // 70% chance hijau
        let x = canvas.width * 0.2 + (Math.random() * canvas.width * 0.6); // Random di area tengah
        let y = canvas.height * 0.2 + (Math.random() * canvas.height * 0.6);
        
        ctx.beginPath();
        ctx.arc(x, y, 15, 0, 2 * Math.PI);
        ctx.fillStyle = isCorrect ? 'rgba(34, 197, 94, 0.7)' : 'rgba(239, 68, 68, 0.7)'; // Green or Red
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'white';
        ctx.stroke();
    }

    // 4. Tampilkan Data di UI Pop-Up
    document.getElementById('namaSiswaScan').innerText = randStu.nama;
    document.getElementById('skorBenar').innerText = benar;
    document.getElementById('skorSalah').innerText = salah;
    document.getElementById('skorAkhir').innerText = nilai;

    // Simpan data sementara ke variabel global jika guru klik "Simpan Nilai"
    window.tempCaptureData = {
        studentId: randStu.id,
        benar: benar,
        salah: salah,
        nilai: nilai
    };

    // 5. Munculkan Pop-Up
    document.getElementById('popupHasilScan').classList.remove('hidden');
};

// -------------------------------------------------------------------------
// SIMPAN HASIL DARI POPUP KE DATABASE LJK
// -------------------------------------------------------------------------
window.simpanHasilCapture = function() {
    if(!window.tempCaptureData) return;

    let db = getDB('mc_ljk_scan');
    let idx = db.findIndex(s => s.id === window.activeScanId);
    
    if(idx > -1) {
        let data = db[idx];
        if(!data.dataSiswa) data.dataSiswa = [];
        
        // Cek apakah siswa ini sudah pernah discan di topik ini
        let existing = data.dataSiswa.findIndex(ds => ds.studentId === window.tempCaptureData.studentId);
        if(existing > -1) {
            data.dataSiswa[existing] = window.tempCaptureData; // Timpa nilai lama
        } else {
            data.dataSiswa.push(window.tempCaptureData); // Tambah baru
        }
        
        saveDB('mc_ljk_scan', db);
        
        // Tutup Pop-Up dan beri notifikasi
        document.getElementById('popupHasilScan').classList.add('hidden');
        window.tempCaptureData = null;
        
        // Notifikasi ringan (Toast) agar guru bisa lanjut scan tanpa terganggu alert besar
        let toast = document.createElement('div');
        toast.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full font-bold shadow-2xl z-[100] fade-in';
        toast.innerHTML = `<i class="fas fa-check-circle mr-2"></i> Nilai Tersimpan! Lanjut scan LJK berikutnya.`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
};

window.kirimLJKKeNilai = async function(idScan) {

window.updateChart = function() {
            // 1. Ambil daftar siswa HANYA untuk kelas/guru yang sedang login
            const students = getMyStudents(); 
            const myStudentIds = students.map(s => s.id);
            
            // 2. Tarik data absen se-sekolah, lalu filter hanya untuk siswa milik guru tersebut
            const absen = filterBySchool(getDB('mc_absen')).filter(a => 
                currentUserRole !== 'guru' || myStudentIds.includes(a.studentId) || a.guruUsername === currentUserUsername
            );
            
            const month = parseInt(document.getElementById('chartMonth').value); 
            const year = parseInt(document.getElementById('chartYear').value);
            
            // 3. Hitung Hari Efektif (KBM) berdasarkan absen yang sudah difilter
            let uniqueDatesClass = new Set(); 
            absen.forEach(a => { 
                const d = new Date(a.tanggal); 
                if(d.getMonth() === month && d.getFullYear() === year) uniqueDatesClass.add(a.tanggal); 
            }); 
            let hariEfektif = uniqueDatesClass.size;
            
            // 4. Filter absen sesuai bulan dan tahun
            let filteredAbsen = absen.filter(a => { 
                const d = new Date(a.tanggal); 
                return d.getMonth() === month && d.getFullYear() === year; 
            }); 
            
            // 5. Jika login sebagai siswa, filter lagi khusus data dirinya
            if (currentUserRole === 'siswa') { 
                filteredAbsen = filteredAbsen.filter(a => a.studentId == currentStudentId); 
            }
            
            // 6. Hitung jumlah H, S, I, TK
            let counts = { h: 0, s: 0, i: 0, t: 0 }; 
            filteredAbsen.forEach(a => { 
                if(a.status === 'Hadir') counts.h++; 
                if(a.status === 'Sakit') counts.s++; 
                if(a.status === 'Izin') counts.i++; 
                if(a.status === 'Tanpa Keterangan') counts.t++; 
            });
            
            // 7. Render Grafik Doughnut Chart
            const canvasEl = document.getElementById('absenChart');
            if (canvasEl) {
                const ctx = canvasEl.getContext('2d'); 
                if (myChart) myChart.destroy();
                myChart = new Chart(ctx, { 
                    type: 'doughnut', 
                    data: { 
                        labels: ['Hadir', 'Sakit', 'Izin', 'Tanpa Keterangan'], 
                        datasets: [{ 
                            data: [counts.h, counts.s, counts.i, counts.t], 
                            backgroundColor: ['#10B981', '#F59E0B', '#3B82F6', '#EF4444'], 
                            borderWidth: 1 
                        }] 
                    }, 
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { legend: { position: 'bottom' } } 
                    } 
                });
            }
            
            // 8. Render Rincian Kalkulasi
            let detailHtml = "";
            if (currentUserRole === 'siswa') {
                let persentaseIndividu = hariEfektif > 0 ? (counts.h / hariEfektif) * 100 : 0;
                detailHtml = `<h4 class="font-bold text-gray-700 mb-4 border-b pb-2">Rincian Kehadiran Anda</h4><div class="space-y-3 text-sm"><div class="flex justify-between border-b pb-1"><span class="text-gray-500">Hari Efektif Kelas:</span><span class="font-bold text-gray-800">${hariEfektif} Hari</span></div><div class="flex justify-between border-b pb-1"><span class="text-gray-500">Anda Hadir:</span><span class="font-bold text-green-600">${counts.h} Kali</span></div><div class="pt-4 text-center"><p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Persentase Kehadiran Anda</p><h2 class="text-4xl font-extrabold ${persentaseIndividu >= 80 ? 'text-green-600' : 'text-red-500'}">${persentaseIndividu.toFixed(1)}%</h2></div></div>`;
            } else {

window.updateModulBab = function() { 
    let kelas = document.getElementById('mKelas').value; 
    let mapel = document.getElementById('mMapel').value; 
    let selBab = document.getElementById('mBab'); 
    let db = getDB('mc_kurikulum'); 
    if(!mapel) { selBab.innerHTML = '<option value="">-- Pilih --</option>'; return; } 
    
    let filteredDB = db.filter(k => k.Kelas === kelas && k.MataPelajaran === mapel);
    let uniqueBabsMap = new Map();
    filteredDB.forEach(k => {
        if(!uniqueBabsMap.has(k.Bab)) {
            let display = k.Bab;
            if(k.MateriPokok) display += ' - ' + k.MateriPokok;
            uniqueBabsMap.set(k.Bab, display);
        }
    });

window.addKalender = async function() {
    const judul = document.getElementById('kJudul').value;
    const fotoFile = document.getElementById('kFoto').files[0];
    
    if(!judul || !fotoFile) { customAlert("Keterangan dan Foto wajib diisi!", "warning"); return; }
    
    document.getElementById('loadingText').innerText = "Mengupload ke Google Drive...";
    document.getElementById('loadingOverlay').classList.remove('hidden');
    
    try {
        let compressedBase64 = await compressImageToBase64(fotoFile, 1200); 
        let finalFotoUrl = await uploadFileToDrive(compressedBase64, 'Kalender_' + Date.now() + '.jpg');
        
        let data = { id: Date.now(), username: currentUserUsername, judul: judul, url: finalFotoUrl, schoolCode: currentSchoolCode };
        let kalenderDb = getDB('mc_kalender');
        kalenderDb.push(data);
        
        saveDB('mc_kalender', kalenderDb);
        syncToSheet('tambah_kalender', data);
        
        document.getElementById('loadingOverlay').classList.add('hidden');
        customAlert("Kalender berhasil diupload!", "success");
        window.renderGuruKalender();
    } catch(e) {
        document.getElementById('loadingOverlay').classList.add('hidden');
        customAlert("Gagal upload: " + e.message, "error");
    }
};

window.deleteKalender = async function(id) {
    const isConfirm = await customConfirm("Hapus kalender pendidikan ini secara permanen?", "Konfirmasi Hapus");
    if(!isConfirm) return;
    
    document.getElementById('loadingText').innerText = "Menghapus...";
    document.getElementById('loadingOverlay').classList.remove('hidden');
    
    setTimeout(() => {
        let kalenderDb = getDB('mc_kalender').filter(k => k.id != id);
        saveDB('mc_kalender', kalenderDb);
        syncToSheet('hapus_kalender', { id: id });
        
        document.getElementById('loadingOverlay').classList.add('hidden');
        window.renderGuruKalender();
    }, 400);
};

// --- LOGIKA FORM & OTOMATISASI KURIKULUM ---
window.updateAgendaMapel = function() {
    const kls = document.getElementById('agKelas').value;
    const db = getDB('mc_kurikulum');
    
    // Ambil Mapel unik berdasarkan Kelas
    const mapels = [...new Set(db.filter(k => k.Kelas === kls).map(k => k.MataPelajaran))].sort();
    
    document.getElementById('agMapel').innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>' + mapels.map(m => `<option value="${m}">${m}</option>`).join('');
    
    // Reset dropdown di bawahnya
    document.getElementById('agRefMateri').innerHTML = '<option value="">-- Pilih Mata Pelajaran Terlebih Dahulu --</option>';
    document.getElementById('agRefTP').innerHTML = '<option value="">-- Pilih Materi Terlebih Dahulu --</option>';
    document.getElementById('agMateri').value = '';
    document.getElementById('agTP').value = '';
};

window.updateAgendaMateri = function() {
    const kls = document.getElementById('agKelas').value;
    const mpl = document.getElementById('agMapel').value;
    const db = getDB('mc_kurikulum').filter(k => k.Kelas === kls && k.MataPelajaran === mpl);
    
    // Kelompokkan menjadi "Bab - Materi Pokok" untuk menghilangkan duplikat jika 1 materi punya banyak TP
    let map = new Set();
    db.forEach(k => {
        if(k.Bab && k.MateriPokok) map.add(k.Bab + ' - ' + k.MateriPokok);
    });
    
    let options = '<option value="">-- Pilih Materi Kurikulum --</option>';
    [...map].sort().forEach(label => { 
        options += `<option value="${label}">${label}</option>`; 
    });
    
    document.getElementById('agRefMateri').innerHTML = options;
    
    // Reset dropdown TP
    document.getElementById('agRefTP').innerHTML = '<option value="">-- Pilih Materi Terlebih Dahulu --</option>';
    document.getElementById('agMateri').value = '';
    document.getElementById('agTP').value = '';
};

window.updateAgendaTP = function() {
    const kls = document.getElementById('agKelas').value;
    const mpl = document.getElementById('agMapel').value;
    const materiVal = document.getElementById('agRefMateri').value;
    
    // Isi otomatis kolom textarea Materi jika dipilih
    if (materiVal) {
        document.getElementById('agMateri').value = materiVal;
    } else {
        document.getElementById('agMateri').value = '';
    }

    // Filter database berdasarkan Kelas, Mapel, dan Gabungan (Bab - Materi Pokok)
    const db = getDB('mc_kurikulum').filter(k => 
        k.Kelas === kls && 
        k.MataPelajaran === mpl && 
        (k.Bab + ' - ' + k.MateriPokok) === materiVal
    );
    
    // Munculkan pilihan Tujuan Pembelajaran (bisa lebih dari satu)
    let options = '<option value="">-- Pilih Tujuan Pembelajaran --</option>';
    db.forEach(k => {
        if(k.TujuanPembelajaran) {
            options += `<option value="${k.TujuanPembelajaran}">${k.TujuanPembelajaran}</option>`;
        }
    });
    
    document.getElementById('agRefTP').innerHTML = options;
    document.getElementById('agTP').value = ''; // Reset textarea TP
};

window.applyAgendaTP = function() {
    const tpVal = document.getElementById('agRefTP').value;
    // Isi otomatis kolom textarea Tujuan Pembelajaran jika dipilih
    if(tpVal) {
        document.getElementById('agTP').value = tpVal;
    } else {
        document.getElementById('agTP').value = '';
    }
};

window.applyAgendaTP = function() {
    const tpVal = document.getElementById('agRefTP').value;
    if(tpVal) {
        document.getElementById('agTP').value = tpVal; // Isi otomatis ke textarea TP
    }
};

window.saveAgenda = function() {
    const data = {
        id: editingAgendaId || Date.now(),
        username: currentUserUsername,
        hari: document.getElementById('agHari').value,
        tanggal: document.getElementById('agTanggal').value,
        pukul: document.getElementById('agPukul').value,
        hadir: document.getElementById('agH').value || 0,
        sakit: document.getElementById('agS').value || 0,
        izin: document.getElementById('agI').value || 0,
        alpha: document.getElementById('agA').value || 0,
        kelas: document.getElementById('agKelas').value,
        mapel: document.getElementById('agMapel').value,
        materi: document.getElementById('agMateri').value,
        tp: document.getElementById('agTP').value,
        tmt: document.getElementById('agTMT').value || '-',
        tmtt: document.getElementById('agTMTT').value || '-',
        proses: document.getElementById('agProses').value || '-'
    };

    if(!data.mapel || !data.materi || !data.tp) { customAlert("Mapel, Materi, dan TP wajib diisi!", "warning"); return; }
    
    document.getElementById('loadingText').innerText = "Menyimpan...";
    document.getElementById('loadingOverlay').classList.remove('hidden');
    
    setTimeout(() => {
        data.schoolCode = currentSchoolCode;
        let db = getDB('mc_agenda');
        if(editingAgendaId) {
            let idx = db.findIndex(a => a.id == editingAgendaId);
            if(idx > -1) db[idx] = data;
        } else {
            db.push(data);
        }
        saveDB('mc_agenda', db);
        syncToSheet('simpan_agenda', data);
        editingAgendaId = null;
        document.getElementById('loadingOverlay').classList.add('hidden');
        customAlert("Agenda Harian berhasil disimpan!", "success");
        window.renderGuruAgenda();
    }, 400);
};

window.editAgenda = function(id) {
    editingAgendaId = id;
    window.renderGuruAgenda();
    const ag = getDB('mc_agenda').find(x => x.id == id);
    if(ag) {
        document.getElementById('agHari').value = ag.hari;
        document.getElementById('agTanggal').value = ag.tanggal;
        document.getElementById('agPukul').value = ag.pukul;
        document.getElementById('agH').value = ag.hadir;
        document.getElementById('agS').value = ag.sakit;
        document.getElementById('agI').value = ag.izin;
        document.getElementById('agA').value = ag.alpha;
        document.getElementById('agKelas').value = ag.kelas;
        window.updateAgendaMapel();
        setTimeout(() => {
            document.getElementById('agMapel').value = ag.mapel;
            window.updateAgendaMateri();
            document.getElementById('agMateri').value = ag.materi;
            document.getElementById('agTP').value = ag.tp;
            document.getElementById('agTMT').value = ag.tmt;
            document.getElementById('agTMTT').value = ag.tmtt;
            document.getElementById('agProses').value = ag.proses;
        }, 150);
    }
    window.scrollTo({top: 0, behavior: 'smooth'});
};

window.deleteAgenda = async function(id) {
    if(!await customConfirm("Hapus catatan agenda ini?")) return;
    document.getElementById('loadingText').innerText = "Menghapus...";
    document.getElementById('loadingOverlay').classList.remove('hidden');
    setTimeout(() => {
        let db = getDB('mc_agenda').filter(a => a.id != id);
        saveDB('mc_agenda', db);
        syncToSheet('hapus_agenda', { id: id });
        document.getElementById('loadingOverlay').classList.add('hidden');
        window.renderGuruAgenda();
    }, 300);
};

window.batalEditAgenda = function() { editingAgendaId = null; window.renderGuruAgenda(); };

window.generateTabelCP = function() {
    let fase = document.getElementById('cpFaseSelect').value;

    if(!fase || selectedMapels.length === 0) { customAlert("Harap pilih Fase dan centang minimal 1 Mapel!", "warning"); return; }
    
    document.getElementById('loadingText').innerText = "Menyusun Dokumen CP..."; 
    document.getElementById('loadingOverlay').classList.remove('hidden');

    setTimeout(() => {
        const cpFull = getDB('mc_cp_master').filter(item => item.fase === fase);
        let combinedHtml = '';

        selectedMapels.forEach((mapel, mIndex) => {
            let dataFiltered = cpFull.filter(item => item.mapel === mapel);
            if(dataFiltered.length === 0) return;

            let trHtml = '';
            dataFiltered.forEach((item, index) => {
                let tdMapel = '';

            });

            let pageBreak = (mIndex < selectedMapels.length - 1) ? '<div style="page-break-after: always; margin-bottom: 40px;"></div>' : '';

            combinedHtml += `
                <div class="mapel-section mb-10">
                    <span class="mapel-title-hidden hidden">${mapel}</span>
                    ${window.getKopSurat()}
                    <div style="text-align: center; margin-bottom: 20px;">

                                <th style="border: 1px solid black; padding: 10px; width: 15%;">Mata Pelajaran</th>
                                <th style="border: 1px solid black; padding: 10px; width: 25%;">Elemen</th>
                                <th style="border: 1px solid black; padding: 10px;">Capaian Pembelajaran</th>
                            </tr>
                        </thead>
                        <tbody>${trHtml}</tbody>
                    </table>
                    ${window.getTandaTangan()}
                </div>
                ${pageBreak}

        });

        document.getElementById('cpOutputArea').innerHTML = `

                <div class="text-xs text-orange-600 font-bold flex items-center mr-auto"><i class="fas fa-info-circle mr-1"></i> Klik pada "Tahun Pelajaran" untuk mengedit teks.</div>

                <button onclick="window.exportToWord('printCPArea', 'CP_Gabungan_${fase}')" class="bg-blue-600 text-white px-4 py-2 rounded font-bold text-sm shadow"><i class="fas fa-file-word mr-2"></i> Word</button>

window.simpanModalProta = function(kurikulumDB, batchId, tahun, kelas, mapel) {
    let rowToSave = [];
    kurikulumDB.forEach((item, i) => {
        let aw = document.getElementById(`mAw_${i}`).value;
        let ket = document.getElementById(`mKet_${i}`).value;
        if(aw || ket) {
            rowToSave.push({
                id: Date.now() + i, guru: currentUserName, guruUsername: currentUserUsername, tahun: tahun, kelas: kelas, mapel: mapel,
                semester: item.Semester, bab: item.Bab, materi: item.MateriPokok,
                tp: item.TujuanPembelajaran, alokasi: aw, keterangan: ket, batchId: batchId
            });
        }

// 2. Fungsi Import / Baca File Excel
window.importKurikulumExcel = function(event) {
    let file = event.target.files[0];
    if (!file) return;

    document.getElementById('loadingText').innerText = "Membaca File Excel...";
    document.getElementById('loadingOverlay').classList.remove('hidden');

    let reader = new FileReader();
    reader.onload = function(e) {
        try {
            let data = new Uint8Array(e.target.result);
            let workbook = XLSX.read(data, {type: 'array'});
            
            // Ambil sheet pertama saja
            let firstSheetName = workbook.SheetNames[0];
            let worksheet = workbook.Sheets[firstSheetName];
            
            // Konversi ke JSON
            let jsonData = XLSX.utils.sheet_to_json(worksheet);

            if(jsonData.length === 0) {
                throw new Error("File Excel kosong atau format tidak terbaca.");
            }

            let kurikulumDB = getDB('mc_kurikulum');
            let newRecords = [];

            // Mapping data agar aman jika header sedikit berbeda
            jsonData.forEach((row, index) => {
                let mapel = row["Mapel"] || row["Mata Pelajaran"];
                let materi = row["Materi Pokok"] || row["Materi"];
                let tp = row["Tujuan Pembelajaran"] || row["TP"];

                // Pastikan kolom wajib terisi semua
                if(row["Kelas"] && mapel && row["Semester"] && row["Bab"] && materi && tp) {
                    let newK = {
                        id: Date.now() + index, // Gunakan index agar ID tidak bentrok
                        Kelas: String(row["Kelas"]).trim(),
                        MataPelajaran: String(mapel).trim(),
                        Semester: String(row["Semester"]).trim(),
                        Bab: String(row["Bab"]).trim(),
                        MateriPokok: String(materi).trim(),
                        TujuanPembelajaran: String(tp).trim()
                    };
                    kurikulumDB.push(newK);
                    newRecords.push(newK);
                }
            });

            if(newRecords.length > 0) {
                saveDB('mc_kurikulum', kurikulumDB);
                
                // Kirim data massal ke Google Apps Script (Backend)
                // Pastikan script.gs Anda siap menerima action 'import_kurikulum' dengan data array
                syncToSheet('import_kurikulum', newRecords);

                customAlert(`Berhasil mengimpor ${newRecords.length} Tujuan Pembelajaran baru!`, "success");
                window.renderGuruDatabase(); // Refresh tabel
            } else {
                customAlert("Gagal import! Format kolom tidak sesuai Template atau ada sel wajib yang kosong.", "error");
            }
        } catch(error) {
            customAlert("Gagal memproses Excel: " + error.message, "error");
        } finally {
            document.getElementById('loadingOverlay').classList.add('hidden');
            event.target.value = ''; // Reset input file agar bisa import file yang sama lagi
        }
    };
    reader.readAsArrayBuffer(file);
};

window.updateCheckboxMapel = function(idFilter, idContainer, cbClass, isFase = false) {
    let filterVal = document.getElementById(idFilter).value;
    let container = document.getElementById(idContainer);
    let db = getDB(isFase ? 'mc_cp_master' : 'mc_kurikulum');

    if(!filterVal) { container.innerHTML = '<span class="text-gray-400 text-xs italic">Pilih filter utama terlebih dahulu...</span>'; return; }

    let mapelTersedia = isFase 
        ? [...new Set(db.filter(k => k.fase === filterVal).map(k => k.mapel))].sort()
        : [...new Set(db.filter(k => k.Kelas === filterVal).map(k => k.MataPelajaran))].sort();

    if(mapelTersedia.length === 0) { container.innerHTML = '<span class="text-red-400 text-xs italic">Data mapel kosong.</span>'; return; }

    let html = `<label class="flex items-center space-x-2 mb-2 border-b pb-2 cursor-pointer sticky top-0 bg-white z-10"><input type="checkbox" onchange="window.toggleAllCb(this, '${cbClass}')" class="form-checkbox text-blue-600 rounded"> <span class="font-bold text-blue-700 text-sm">Pilih Semua Mapel</span></label>`;
    mapelTersedia.forEach(m => {
        if(m) html += `<label class="flex items-center space-x-2 mb-1 cursor-pointer"><input type="checkbox" value="${m}" class="${cbClass} form-checkbox text-gray-600 rounded"> <span class="text-sm font-semibold text-gray-700">${m}</span></label>`;
    });
    container.innerHTML = html;
};

window.toggleAllCb = function(masterCb, cbClass) {
    let cbs = document.querySelectorAll('.' + cbClass);
    cbs.forEach(cb => cb.checked = masterCb.checked);
};

window.exportMultiTableToExcel = function(containerId, filenamePrefix) {
    document.getElementById('loadingText').innerText = "Menyiapkan Multi-Sheet Excel...";
    document.getElementById('loadingOverlay').classList.remove('hidden');
    setTimeout(() => {
        let wb = XLSX.utils.book_new();
        let tables = document.getElementById(containerId).querySelectorAll('table');
        let mapelNames = document.getElementById(containerId).querySelectorAll('.mapel-title-hidden'); 
        
        tables.forEach((table, index) => {
            let ws = XLSX.utils.table_to_sheet(table);
            // Bersihkan nama mapel agar valid untuk nama sheet Excel (Maks 30 karakter, tanpa simbol khusus)
            let rawName = mapelNames[index] ? mapelNames[index].innerText : `Sheet${index+1}`;
            let sheetName = rawName.substring(0, 30).replace(/[\\/*?:\[\]]/g, "").trim();
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
        });
		let finalName = filenamePrefix + '.xlsx';
				let wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
				let blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
				let url = URL.createObjectURL(blob);
				let a = document.createElement('a');
				a.href = url; a.download = finalName;
				document.body.appendChild(a); a.click();
				document.body.removeChild(a);
				setTimeout(() => URL.revokeObjectURL(url), 1000);
				document.getElementById('loadingOverlay').classList.add('hidden');
			}, 800);
};

window.generateTabelKKTP = function() {
    let tahun = document.getElementById('kktpTahun').value; 
    let kelas = document.getElementById('kktpKelas').value; 
    let selectedMapels = Array.from(document.querySelectorAll('.cb-mapel-kktp:checked')).map(cb => cb.value);

    if(!tahun || !kelas || selectedMapels.length === 0) { customAlert("Harap lengkapi filter dan centang minimal 1 Mapel!", "warning"); return; }
    
    document.getElementById('loadingText').innerText = "Menyusun Dokumen KKTP..."; 
    document.getElementById('loadingOverlay').classList.remove('hidden');
    
    setTimeout(() => {
        let kurikulumFull = getDB('mc_kurikulum');
        let combinedHtml = '';

        // Teks Bawaan/Default jika sel di Spreadsheet (Kolom H-L) ada yang kosong
        const def1 = "Belum mencapai tujuan pembelajaran. Pendidik menanyakan kepada murid tantangan apa yang mereka hadapi (perlu remedial dengan mempelajari kembali seluruh kriteria).";
        const def2 = "Belum mencapai tujuan pembelajaran, perlu remedial dengan mempelajari kembali sebagian besar kriteria.";
        const def3 = "Hampir mencapai tujuan pembelajaran, perlu remedial dengan mempelajari kembali kriteria yang diperlukan.";
        const def4 = "Sudah mencapai tujuan pembelajaran.";
        const def5 = "Sudah mencapai tujuan pembelajaran, perlu tantangan lebih (pengayaan).";

        selectedMapels.forEach((mapel, mIndex) => {
            let dataFiltered = kurikulumFull.filter(k => k.Kelas === kelas && k.MataPelajaran === mapel);
            if(dataFiltered.length === 0) return;
            
            dataFiltered.sort((a, b) => { if(a.Semester !== b.Semester) return a.Semester.localeCompare(b.Semester); return a.Bab.localeCompare(b.Bab); });
            
            let trHtml = ''; 
            let countMateri = {}; 
            dataFiltered.forEach(item => { let keyMateri = item.Bab + '_' + item.MateriPokok; countMateri[keyMateri] = (countMateri[keyMateri] || 0) + 1; });
            let lastMateriKey = null;

            dataFiltered.forEach((item, index) => {
                let keyMateri = item.Bab + '_' + item.MateriPokok;

                    lastMateriKey = keyMateri; 
                }

                // Ambil data interval dari Database (Kolom H-L), pakai teks default jika kosong
                let i1 = item.int1 || def1;
                let i2 = item.int2 || def2;
                let i3 = item.int3 || def3;

                ${combinedHtml}

    students.forEach((s, index) => {
        let count = { smt1: {h:0, s:0, i:0, t:0}, smt2: {h:0, s:0, i:0, t:0} };
        absen.filter(a => a.studentId == s.id).forEach(a => {
            // Semester 1 = Juli - Desember (Bulan ke 6 - 11 di JavaScript)
            let d = new Date(a.tanggal);
            let isSmt1 = d.getMonth() >= 6; 
            let tgt = isSmt1 ? count.smt1 : count.smt2;
            
            if(a.status === 'Hadir') tgt.h++;
            else if(a.status === 'Sakit') tgt.s++;
            else if(a.status === 'Izin') tgt.i++;
            else tgt.t++;
        });

        trHtml += `
            <tr style="border: 1px solid black;">
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${index + 1}</td>
                <td style="border: 1px solid black; padding: 6px;">${s.nama}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt1.h}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt1.s}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt1.i}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt1.t}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt2.h}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt2.s}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt2.i}</td>
                <td style="border: 1px solid black; padding: 6px; text-align: center;">${count.smt2.t}</td>
            </tr>`;
    });

    // 2. Buat elemen HTML sementara untuk dirender ke PDF
    const printAreaId = 'printAreaRekapAbsenSmt';
    let printDiv = document.getElementById(printAreaId);
    if (!printDiv) {
        printDiv = document.createElement('div');
        printDiv.id = printAreaId;
        document.body.appendChild(printDiv);
    }

    let currentYear = new Date().getFullYear();
    let tahunAjaranText = currentYear + '/' + (currentYear+1);

    printDiv.innerHTML = `
        <div style="font-family:'Times New Roman', serif; color: black; background: white; padding: 20px;">
            ${window.getKopSurat()}
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="text-transform: uppercase; text-decoration: underline; margin-bottom: 5px; font-weight: bold;">REKAPITULASI ABSENSI SEMESTER</h2>
                <p style="margin-top: 0; font-weight: bold;">Tahun Pelajaran: ${tahunAjaranText}</p>
            </div>
            <table style="width: 100%; border-collapse: collapse; border: 1px solid black; font-size: 12px;">
                <thead>
                    <tr style="background-color: #f2f2f2;">
                        <th rowspan="2" style="border: 1px solid black; padding: 8px;">NO</th>
                        <th rowspan="2" style="border: 1px solid black; padding: 8px;">NAMA SISWA</th>
                        <th colspan="4" style="border: 1px solid black; padding: 8px; text-align: center;">Semester 1 (Jul-Des)</th>
                        <th colspan="4" style="border: 1px solid black; padding: 8px; text-align: center;">Semester 2 (Jan-Jun)</th>
                    </tr>
                    <tr style="background-color: #f2f2f2;">
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">H</th>
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">S</th>
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">I</th>
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">TK</th>
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">H</th>
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">S</th>
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">I</th>
                        <th style="border: 1px solid black; padding: 4px; text-align: center; width: 5%;">TK</th>
                    </tr>
                </thead>
                <tbody>${trHtml}</tbody>
            </table>
            <br>${window.getTandaTangan()}
        </div>
    `;

    // 3. Konfigurasi dan Eksekusi html2pdf
    const opt = {
        margin: [10, 10, 10, 10],
        filename: 'Rekap_Absen_Semester.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } // Format lanskap agar tabel lebar muat
    };

    document.getElementById('loadingText').innerText = "Membuat PDF Rekap..."; 
    document.getElementById('loadingOverlay').classList.remove('hidden');

    html2pdf().set(opt).from(printDiv).save().then(() => {
        printDiv.innerHTML = ''; // Bersihkan elemen setelah cetak
        document.getElementById('loadingOverlay').classList.add('hidden');
    });
};
</script>
</body>
</html>
